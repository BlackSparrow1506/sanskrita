name: परीक्षा (test suite)

on:
  push:
    branches: ["main", "phase-*"]
  pull_request:

jobs:
  pariksha:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run the suite
        run: python3 परीक्षा.py
